[Config]
MinimumVersion=27~devel

[Distribution]
Distribution=fedora
Release=rawhide

[Build]
ToolsTree=default
ToolsTreeDistribution=fedora
ToolsTreeRelease=rawhide
ToolsTreeProfiles=misc
CacheDirectory=mkosi.cache

[Output]
OutputDirectory=mkosi.output
SplitArtifacts=uki,partitions
Format=disk
ImageId=ParticulaOS
ManifestFormat=json
Output=%i_%v_%a
CompressOutput=xz

[Content]
UnifiedKernelImageFormat=%i_%v_%a
KernelCommandLine=
        root=dissect
        mount.usr=dissect
        rw
        audit=0
        systemd.image_policy=esp=unprotected:xbootldr=unprotected+unused+absent:usr=verity:root=encrypted+absent:swap=encrypted+unused+absent:home=unprotected+absent:=ignore
        systemd.image_filter=usr=ParticulaOS_*:usr-verity=ParticulaOS_*:root=ParticulaOS-*:swap=ParticulaOS-*:home=ParticulaOS-*
        ipe.enforce=0
KernelInitrdModules=default
Hostname=particula-????-????

Packages=
        acl
        attr
        bash-completion
        btrfs-progs
        ca-certificates
        coreutils
        cpio
        curl
        dbus-broker
        diffutils
        dmidecode
        dosfstools
        e2fsprogs
        efibootmgr
        erofs-utils
        exfatprogs
        file
        findutils
        fish
        fwupd
        gdb
        gdisk
        grep
        gzip
        jq
        kbd
        kexec-tools
        kmod
        less
        man
        mtools
        nano
        nftables
        nvme-cli
        opensc
        openssl
        patch
        p11-kit
        pciutils
        pkcs11-provider
        sed
        socat
        strace
        systemd
        tar
        tree
        udev
        unzip
        usbutils
        util-linux
        which
        wireguard-tools
        xxd
        yubikey-manager
        zip
        zstd

VolatilePackages=
        systemd
        udev

InitrdVolatilePackages=
        systemd
        udev
